<!DOCTYPE html>
<html>
<head>
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
</head>

<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center align-items-center h-100">
            <div class="col-md-7 col-xl-5">
                <div class="card">

                    <!-- HEADER -->
                    <div class="card-header">
                        <div class="d-flex align-items-center">
                            <div class="bot_avatar_wrap">
                                <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="bot_avatar">
                            </div>
                            <div class="bot_info">
                                <span>Medical Chatbot</span>
                                <p>Ask me anything!</p>
                            </div>
                        </div>
                    </div>

                    <!-- MESSAGES -->
                    <div id="messageFormeight" class="card-body msg_card_body">
                    </div>

                    <!-- INPUT -->
                    <div class="card-footer">
                        <form id="messageArea" class="input-group">
                            <input type="text" id="text" name="msg"
                                placeholder="Type your message..."
                                autocomplete="off"
                                class="form-control type_msg" required/>
                            <div class="input-group-append">
                                <button type="submit" class="send_btn">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function () {

            function getTime() {
                const d = new Date();
                return d.getHours() + ":" + d.getMinutes().toString().padStart(2, '0');
            }

            function scrollToBottom() {
                const body = $("#messageFormeight");
                body.scrollTop(body[0].scrollHeight);
            }

            function appendUserMsg(text) {
                const t = getTime();
                const html = `
                <div class="d-flex justify-content-end align-items-end mb-3">
                    <div class="user_bubble_wrap">
                        <div class="user_bubble">${text}</div>
                        <span class="msg_time_send">${t}</span>
                    </div>
                    <div class="user_avatar_wrap">
                        <img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="user_avatar">
                    </div>
                </div>`;
                $("#messageFormeight").append(html);
                scrollToBottom();
            }

            function appendBotMsg(text) {
                const t = getTime();
                const html = `
                <div class="d-flex justify-content-start align-items-end mb-3">
                    <div class="bot_msg_avatar_wrap">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="bot_msg_avatar">
                    </div>
                    <div class="bot_bubble_wrap">
                        <div class="bot_bubble">${text}</div>
                        <span class="msg_time_bot">${t}</span>
                    </div>
                </div>`;
                $("#messageFormeight").append(html);
                scrollToBottom();
            }

            function showTyping() {
                const html = `
                <div class="d-flex justify-content-start align-items-end mb-3" id="typing_row">
                    <div class="bot_msg_avatar_wrap">
                        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="bot_msg_avatar">
                    </div>
                    <div class="bot_bubble typing_dots">where
                        <span></span><span></span><span></span>
                    </div>
                </div>`;
                $("#messageFormeight").append(html);
                scrollToBottom();
            }

            $("#messageArea").on("submit", function (event) {
                event.preventDefault();
                const rawText = $("#text").val().trim();
                if (!rawText) return;
                $("#text").val("");

                appendUserMsg(rawText);
                showTyping();

                $.ajax({
                    data: { msg: rawText },
                    type: "POST",
                    url: "/get",
                }).done(function (data) {
                    $("#typing_row").remove();
                    appendBotMsg(data);
                }).fail(function () {
                    $("#typing_row").remove();
                    appendBotMsg("Sorry, I couldn't connect. Please try again.");
                });
            });
        });
    </script>
</body>
</html>
